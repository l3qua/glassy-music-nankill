<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>YouTube NonStop +</title>
		<link rel="stylesheet" href="popup.css" />
	</head>
	<body>
		<div class="container">
			<div class="status">
				<svg
					class="status-icon"
					xmlns="http://www.w3.org/2000/svg"
					viewBox="0 0 24 24"
					fill="currentColor"
				>
					<path
						d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
					></path>
				</svg>
				<span class="status-text">Active</span>
			</div>

			<h1 class="title">YouTube NonStop +</h1>

			<p class="description">
				Your videos will continue playing without interruption.
			</p>

			<div class="footer">
				<a
					href="https://chromewebstore.google.com/detail/youtube-nonstop-+/fboblaiflnpfojmmnenhacobmckefmlh"
					target="_blank"
					>Rate Extension</a
				>
				<span class="separator"></span>
				<a href="https://saasminded.dev/youtube-nonstop-browser-extension/" target="_blank"
					>Learn More</a
				>
			</div>
		</div>
	</body>
</html>
