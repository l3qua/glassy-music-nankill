appId: "glassy-music-nankill-mod"
productName: "Glassy Music"
files:
  - '!*'
  - dist
  - assets
  - license
  - '!node_modules'
  - 'node_modules/custom-electron-prompt/**'
  - 'node_modules/@ghostery/adblocker-electron-preload/**'
  - 'node_modules/@ffmpeg.wasm/core-mt/**'
  - '!node_modules/**/*.map'
  - '!node_modules/**/*.ts'
asarUnpack:
  - assets
mac:
  target:
    - target: zip   # Khuyên dùng: Build thêm .zip để dễ debug hoặc gửi file thô nếu dmg lỗi
      arch:
        - x64
        - arm64
  icon: assets/generated/icons/mac/icon.icns # LƯU Ý: Phải là đuôi .icns chuẩn
win:
  icon: assets/generated/icons/win/icon.ico
  target:
    - target: nsis-web
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
        - arm64
  compression: maximum
nsisWeb:
  runAfterFinish: false
linux:
  icon: assets/generated/icons/png
  category: AudioVideo
  desktop:
    entry:
      StartupWMClass: "nankill.xyz.glassymusic.mod"
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
    - target: tar.gz
      arch:
        - x64
        - arm64
appImage:
  description: "Glassy Music - Custom mod by NanKill"
  category: AudioVideo
deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
    - libasound2
    - libgbm1
rpm:
  depends:
    - libuuid
  fpm:
    - '--rpm-rpmbuild-define'
    - _build_id_links none
snap:
  slots:
    - mpris:
        interface: mpris
directories:
  output: ./pack/
extraResources:
  - from: "extensions"
    to: "extensions"